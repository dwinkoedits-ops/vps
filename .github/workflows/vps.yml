name: VPS-Immortel-Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Connexion Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: chrish4x999hp
          ephemeral: true

      # 1. Synchronisation initiale : Télécharge tout du Drive vers le VPS
      - name: Synchronisation du Drive vers VPS
        run: |
          sudo apt-get update && sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_TOKEN }}" | base64 -d > ~/.config/rclone/token.json
          printf "[gdrive]\ntype = drive\nscope = drive\ntoken = %s\nteam_drive =\n" "$(cat ~/.config/rclone/token.json)" > ~/.config/rclone/rclone.conf
          mkdir -p ~/mon_disque 
          echo "Données récupérées !"

      - name: Setup SSH
        run: |
          sudo apt-get install -y openssh-server
          echo "runner:vps123" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart

      - name: Maintien du service
        run: |
          echo "--- VPS chrish4x999hp EN LIGNE ---"
          sleep 21600
        # 2. Sauvegarde automatique avant la fin (même si le job est annulé)
        if: always()
      
      - name: Sauvegarde vers le Drive
        if: always()
        run: |
          rclone sync ~/mon_disque gdrive:
          echo "Sauvegarde terminée."
