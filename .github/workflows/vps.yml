name: VPS-Immortel-Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. Connexion Tailscale (Nom Fixe : chrish4x999hp)
      - name: Connexion Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: chrish4x999hp
          ephemeral: true

      # 2. Montage du Google Drive (Tes fichiers immortels dans ~/mon_disque)
      # 2. Montage du Google Drive (Corrigé)
      - name: Montage du Disque Immortel
        run: |
          sudo apt-get update && sudo apt-get install -y rclone
          mkdir -p ~/.config/rclone
          # On crée le fichier de configuration au format correct
          cat <<EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          token = ${{ secrets.RCLONE_CONFIG }}
          EOF
          mkdir -p ~/mon_disque
          rclone mount gdrive: /home/runner/mon_disque --daemon --allow-other
          
      # 3. Setup SSH avec MOT DE PASSE (vps123)
      - name: Setup SSH
        run: |
          sudo apt-get install -y openssh-server
          # On force le mot de passe 'vps123'
          echo "runner:vps123" | sudo chpasswd
          # On autorise la connexion par mot de passe
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh restart

      # 4. Maintien en vie
      - name: Maintien du service
        run: |
          echo "--- VPS chrish4x999hp EN LIGNE ---"
          echo "Connecte-toi avec : ssh runner@chrish4x999hp"
          echo "Mot de passe : vps123"
          sleep 21600
