name: VPS Immortel

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/authorized_keys
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/authorized_keys
          sudo service ssh start

      - name: Connexion Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Maintien et Auto-Relance
        shell: bash
        run: |
          echo "VPS lancé. Auto-relance programmée en arrière-plan."
          
          # On lance le compte à rebours en arrière-plan (&)
          (
            sleep 21000
            curl -L \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
              -d '{"ref":"main"}'
          ) &
          
          echo "Le script de relance tourne en arrière-plan. Le job peut continuer."
