name: VPS Tailscale Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Connexion Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          # On ne met pas de hostname ici pour laisser Tailscale gérer l'ID automatiquement
          # Cela évite les conflits si tu relances souvent
          ephemeral: false

      - name: Setup SSH
        run: |
          sudo apt-get update && sudo apt-get install -y openssh-server
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/authorized_keys
          sudo service ssh start

      - name: Maintien du service
        run: |
          # Affiche l'IP pour que tu puisses la copier dans les logs GitHub
          echo "Connecte-toi avec : ssh runner@$(tailscale ip -4)"
          sleep 21600
